{% extends "base.html" %}
{% set page_type = "internal" %}

{% block content %}

<section class="shell">

  <div class="section-head">
    <div class="section-copy">
      <div class="page-kicker">Administration</div>
      <h1 class="page-title">Add Admin</h1>
    </div>

    <div class="toolbar">
      <a href="{{ url_for('admin_manage_admins') }}" class="ghost-link">
        Back to Admins
      </a>
    </div>
  </div>

  {% if error %}
    <div class="notice notice--warning">{{ error }}</div>
  {% endif %}

  {% if success %}
    <div class="notice notice--success">{{ success }}</div>
  {% endif %}

  <div class="card admin-form-card">
    <div class="section-copy section-copy-tight" style="margin-bottom: 1rem;">
      <h2 style="font-size:1.15rem;">New administrator</h2>
    </div>

    <form method="post" action="{{ url_for('admin_create_admin') }}" class="admin-create-form">
      <input
        type="email"
        name="email"
        placeholder="New admin email"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="New password"
        required
        minlength="8"
      />

      <input
        type="password"
        name="confirm_password"
        placeholder="Confirm password"
        required
        minlength="8"
      />

      <div class="action-row" style="margin-top: 1rem;">
        <button type="submit" class="button-link button-secondary dashboard-action">
          Create admin
        </button>
      </div>
    </form>
  </div>
</section>

{% endblock %}
