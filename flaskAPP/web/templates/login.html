{% extends "base.html" %}
{% set page_type = "internal" %}

{% block content %}

<section style="padding: 4rem 6rem; max-width: 1200px;">

  <div class="card" style="max-width: 520px; margin: 0 auto; padding: 2rem;">
    <h1 style="font-size: 2.4rem; margin: 0 0 1.5rem;">
      Login
    </h1>

    <p style="opacity:0.75; margin: 0 0 1.5rem;">
      Sign in using your email and password.
    </p>

    {% if error %}
      <div class="error" style="margin-bottom: 1rem;">
        {{ error }}
      </div>
    {% endif %}

    {% if success %}
      <div style="margin-bottom: 1rem; padding: 0.9rem 1rem; border-radius: 12px; background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.28); color: #dcfce7;">
        {{ success }}
      </div>
    {% endif %}

    <form method="post" action="{{ url_for('login_submit') }}" style="display:flex; flex-direction:column; gap: 0.9rem;">
      <label style="opacity:0.85;">Email</label>
      <input
        type="email"
        name="email"
        required
        autocomplete="email"
        value="{{ email if email else '' }}"
        style="width:100%;"
      />

      <label style="opacity:0.85;">Password</label>
      <input
        type="password"
        name="password"
        required
        autocomplete="current-password"
        style="width:100%;"
      />

      <div class="auth-actions">
        <button type="submit" class="auth-action">
          Login
        </button>

        <a
          href="{{ url_for('forgot_password_page') }}"
          class="auth-action"
        >
          Forgot Password
        </a>
      </div>
    </form>
  </div>

</section>

{% endblock %}
