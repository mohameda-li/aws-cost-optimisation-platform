{% extends "base.html" %}
{% set page_type = "internal" %}

{% block content %}

<section class="auth-shell">

  <div class="card auth-card">
    <h1 class="auth-title">
      Login
    </h1>

    <p class="auth-subtitle">
      Sign in using your email and password.
    </p>

    {% if error %}
      <div class="error" style="margin-bottom: 1rem;">
        {{ error }}
      </div>
    {% endif %}

    {% if success %}
      <div class="notice notice--success">
        {{ success }}
      </div>
    {% endif %}

    <form method="post" action="{{ url_for('login_submit') }}" class="auth-form">
      <label class="auth-label">Email</label>
      <input
        type="email"
        name="email"
        required
        autocomplete="email"
        value="{{ email if email else '' }}"
        style="width:100%;"
      />

      <label class="auth-label">Password</label>
      <input
        type="password"
        name="password"
        required
        autocomplete="current-password"
        style="width:100%;"
      />

      <div class="auth-stack">
        <button type="submit" class="auth-action">
          Login
        </button>

        <a
          href="{{ url_for('forgot_password_page') }}"
          class="auth-action"
        >
          Forgot Password
        </a>
      </div>
    </form>
  </div>

</section>

{% endblock %}
