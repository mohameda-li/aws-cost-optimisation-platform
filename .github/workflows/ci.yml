name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit and integration tests with coverage
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report --fail-under=80

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform -chdir=flaskAPP/web/package_templates/customer-deployment/terraform fmt -check

      - name: Terraform validate
        run: |
          terraform -chdir=flaskAPP/web/package_templates/customer-deployment/terraform init -backend=false
          terraform -chdir=flaskAPP/web/package_templates/customer-deployment/terraform validate
